        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
          description: The unique ID for a Session
        - name: agentid
          in: query
          type: string
          description: Constrain operation to one Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-sessions-session-id-enable
      path: /account/monitors/sessions/{session_id}/enable
      operations:
      - name: get-account-monitors-sessions-session-id-enable
        method: GET
