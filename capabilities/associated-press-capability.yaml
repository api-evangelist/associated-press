naftiko: 1.0.0-alpha2
info:
  label: Associated Press AP Media API
  description: AP's next generation content API.
  tags:
  - Associated
  - Press
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: associated-press
    baseUri: //api.ap.org/media/v
    description: Associated Press AP Media API HTTP API.
    authentication:
      type: apikey
      in: header
      name: x-api-key
      value: '{{ASSOCIATED_PRESS_TOKEN}}'
    resources:
    - name: content-item-id
      path: /content/{item_id}
      operations:
      - name: get-content-item-id
        method: GET
        description: Associated Press Single item metadata lookup
        inputParameters:
        - name: item_id
          in: path
          type: string
          required: true
          description: The itemid of the desired piece of content
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: pricing
          in: query
          type: boolean
          description: Whether to include pricing information with the results
        - name: in_my_plan
          in: query
          type: boolean
          description: Specifying in_my_plan=true in the request returns only those associations of the content item that
            do not incur any additional cost to download.
        - name: format
          in: query
          type: string
          description: The desired response format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-search
      path: /content/search
      operations:
      - name: get-content-search
        method: GET
        description: Associated Press Search for AP content
        inputParameters:
        - name: q
          in: query
          type: string
          description: Your query
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: sort
          in: query
          type: string
          description: Your desired sorting criteria
        - name: page
          in: query
          type: string
          description: The desired page number. Page numbers begin at 1
        - name: page_size
          in: query
          type: integer
          description: Number of items to return per page
        - name: pricing
          in: query
          type: boolean
          description: Whether to include pricing information with the results
        - name: in_my_plan
          in: query
          type: boolean
          description: Specifying in_my_plan=true in the request returns only those items that do not incur additional cost
            to download. Additionally, items returned include only thos
        - name: session_label
          in: query
          type: string
          description: Attach an informational label to this session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-feed
      path: /content/feed
      operations:
      - name: get-content-feed
        method: GET
        description: Associated Press Receive a feed of incoming AP content
        inputParameters:
        - name: q
          in: query
          type: string
          description: Your query
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: page_size
          in: query
          type: integer
          description: Number of items to return per page
        - name: pricing
          in: query
          type: boolean
          description: Whether to include pricing information with the results
        - name: in_my_plan
          in: query
          type: boolean
          description: Specifying in_my_plan=true in the request returns only those items that do not incur additional cost
            to download. Additionally, items returned include only thos
        - name: with_monitor
          in: query
          type: string
          description: Apply the named Monitor to subsequent calls for this session
        - name: session_label
          in: query
          type: string
          description: Attach an informational label to this session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-rss
      path: /content/rss
      operations:
      - name: get-content-rss
        method: GET
        description: Associated Press Retrieve a list of available RSS XML feeds entitled to your plan.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-rss-rss-id
      path: /content/rss/{rss_id}
      operations:
      - name: get-content-rss-rss-id
        method: GET
        description: Associated Press Receive a RSS feed of latest AP content
        inputParameters:
        - name: rss_id
          in: path
          type: integer
          required: true
          description: The product ID for the desired RSS feed (see /content/rss)
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: page_size
          in: query
          type: integer
          description: Number of items to return per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-ondemand
      path: /content/ondemand
      operations:
      - name: get-content-ondemand
        method: GET
        description: Associated Press Receive a feed of AP content items which have been sent to your organization's OnDemand
          queue.
        inputParameters:
        - name: consumer_id
          in: query
          type: string
          description: A user defined identifier for the consumer of this feed. Each unique consumer ID will receive every
            item in your organization's OnDemand queue once. If not spec
        - name: queue
          in: query
          type: string
          description: The ID of the desired queue.
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: page_size
          in: query
          type: integer
          description: Number of items to return per page
        - name: pricing
          in: query
          type: boolean
          description: Whether to include pricing information with the results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account
      path: /account
      operations:
      - name: get-account
        method: GET
        description: Associated Press View available account endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-followedtopics
      path: /account/followedtopics
      operations:
      - name: get-account-followedtopics
        method: GET
        description: Associated Press View your Followed Topics
        inputParameters:
        - name: format
          in: query
          type: string
          description: '''json'' is the default. Use ''csv'' for simplified CSV output/download.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-plans
      path: /account/plans
      operations:
      - name: get-account-plans
        method: GET
        description: Associated Press View your plans and meters
        inputParameters:
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response.
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response.
        - name: format
          in: query
          type: string
          description: '''json'' is the default. Use ''csv'' for simplified CSV output/download.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-downloads
      path: /account/downloads
      operations:
      - name: get-account-downloads
        method: GET
        description: Associated Press View your order history.
        inputParameters:
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: min_date
          in: query
          type: string
          description: The date and time after which the content items were downloaded, in the format YYYY-MM-DD(THH:mm:ss)
            or YYYY-MM. The default is 30 days prior to the time of the
        - name: max_date
          in: query
          type: string
          description: The date and time before which the content items were downloaded, in the format YYYY-MM-DD(THH:mm:ss)
            or YYYY-MM. The default is the time of the request.
        - name: order
          in: query
          type: integer
          description: The ID of the desired order to return. The correct date-range must be provided.
        - name: format
          in: query
          type: string
          description: '''json'' is the default. Use ''csv'' for simplified CSV output/download'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-quotas
      path: /account/quotas
      operations:
      - name: get-account-quotas
        method: GET
        description: Associated Press View your API request limits.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-create
