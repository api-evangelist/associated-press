        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-sessions-session-id
      path: /account/monitors/sessions/{session_id}
      operations:
      - name: get-account-monitors-sessions-session-id
        method: GET
        description: Associated Press View one Session
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
          description: The unique ID for a Session
        - name: show_detail
          in: query
          type: boolean
          description: Return full details of Monitors and latest Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-sessions-session-id-disable
