        inputParameters:
        - name: monitorId
          in: path
          type: string
          required: true
          description: The unique name or ID of the Monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-monitorid-delete
      path: /account/monitors/{monitorId}/delete
      operations:
      - name: delete-account-monitors-monitorid-delete
        method: DELETE
        description: Associated Press Delete a Monitor
        inputParameters:
        - name: monitorId
          in: path
          type: string
          required: true
          description: The unique name or ID of the Monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors
      path: /account/monitors
      operations:
      - name: get-account-monitors
        method: GET
        description: Associated Press List your Monitors. (formerly /account/monitors/get)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-monitorid
      path: /account/monitors/{monitorId}
      operations:
      - name: get-account-monitors-monitorid
        method: GET
        description: Associated Press View one Monitor
        inputParameters:
        - name: monitorId
          in: path
          type: string
          required: true
          description: The unique name or ID of the desired Monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-alerts
      path: /account/monitors/alerts
      operations:
      - name: get-account-monitors-alerts
        method: GET
        description: Associated Press View recent Alerts
        inputParameters:
        - name: show_detail
          in: query
          type: boolean
          description: Return full details of Monitors and latest Alert
        - name: agentid
          in: query
          type: string
          description: Constrain operation to one Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-sessions
