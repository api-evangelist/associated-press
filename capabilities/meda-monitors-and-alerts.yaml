    resources:
    - name: account-monitors
      path: /account/monitors
      operations:
      - name: get
        method: GET
        description: Associated Press List your Monitors. (formerly /account/monitors/get)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-monitors-alerts
      path: /account/monitors/alerts
      operations:
      - name: get
        method: GET
        description: Associated Press View recent Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: show_detail
          in: query
          type: boolean
          description: Return full details of Monitors and latest Alert
        - name: agentid
          in: query
          type: string
          description: Constrain operation to one Agent
    - name: account-monitors-create
      path: /account/monitors/create
      operations:
      - name: post
        method: POST
        description: Associated Press Create a new Monitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
