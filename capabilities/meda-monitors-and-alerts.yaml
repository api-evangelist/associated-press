      operations:
      - name: get
        method: GET
        description: Associated Press View one Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: session_id
          in: path
          type: string
          description: The unique ID for a Session
          required: true
        - name: show_detail
