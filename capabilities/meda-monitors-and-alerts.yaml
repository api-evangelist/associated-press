naftiko: 1.0.0-alpha2
info:
  label: Associated Press AP Media API — Monitors and Alerts
  description: 'Associated Press AP Media API — Monitors and Alerts. 10 operations. Lead operation: Associated Press List
    your Monitors. (formerly /account/monitors/get). Self-contained Naftiko capability covering one Associated Press business
    surface.'
  tags:
  - Associated Press
  - Monitors and Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
