naftiko: 1.0.0-alpha2
info:
  label: Associated Press AP Media API — Account
  description: 'Associated Press AP Media API — Account. 6 operations. Lead operation: Associated Press View available account
    endpoints. Self-contained Naftiko capability covering one Associated Press business surface.'
  tags:
  - Associated Press
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASSOCIATED_PRESS_API_KEY: ASSOCIATED_PRESS_API_KEY
capability:
  consumes:
  - type: http
    namespace: meda-account
    baseUri: ''
    description: Associated Press AP Media API — Account business capability. Self-contained, no shared references.
    resources:
    - name: account
      path: /account
      operations:
      - name: get
        method: GET
        description: Associated Press View available account endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-downloads
      path: /account/downloads
      operations:
      - name: get
        method: GET
        description: Associated Press View your order history.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response
        - name: min_date
          in: query
          type: string
          description: The date and time after which the content items were downloaded, in the format
        - name: max_date
          in: query
          type: string
          description: The date and time before which the content items were downloaded, in the
        - name: order
          in: query
          type: integer
          description: The ID of the desired order to return. The correct date-range must be provided.
        - name: format
          in: query
          type: string
          description: '''json'' is the default. Use ''csv'' for simplified CSV output/download'
    - name: account-followedtopics
      path: /account/followedtopics
      operations:
      - name: get
        method: GET
        description: Associated Press View your Followed Topics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: '''json'' is the default. Use ''csv'' for simplified CSV output/download.'
    - name: account-plans
      path: /account/plans
      operations:
      - name: get
        method: GET
        description: Associated Press View your plans and meters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: array
          description: Comma separated list of fields to include from the response.
        - name: exclude
          in: query
          type: array
          description: Comma separated list of fields to exclude from the response.
        - name: format
          in: query
          type: string
          description: '''json'' is the default. Use ''csv'' for simplified CSV output/download.'
    - name: account-quotas
      path: /account/quotas
      operations:
      - name: get
        method: GET
        description: Associated Press View your API request limits.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-rss
      path: /content/rss
      operations:
      - name: get
        method: GET
        description: Associated Press Retrieve a list of available RSS XML feeds entitled to your plan.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ASSOCIATED_PRESS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: meda-account-rest
    port: 8080
    description: REST adapter for Associated Press AP Media API — Account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/account
      name: account
      description: REST surface for account.
      operations:
      - method: GET
        name: get
        description: Associated Press View available account endpoints
        call: meda-account.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account/downloads
      name: account-downloads
      description: REST surface for account-downloads.
      operations:
      - method: GET
        name: get
        description: Associated Press View your order history.
        call: meda-account.get
        with:
          include: rest.include
          exclude: rest.exclude
          min_date: rest.min_date
          max_date: rest.max_date
          order: rest.order
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account/followedtopics
      name: account-followedtopics
      description: REST surface for account-followedtopics.
      operations:
      - method: GET
        name: get
        description: Associated Press View your Followed Topics
        call: meda-account.get
        with:
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account/plans
      name: account-plans
      description: REST surface for account-plans.
      operations:
      - method: GET
        name: get
        description: Associated Press View your plans and meters
        call: meda-account.get
        with:
          include: rest.include
          exclude: rest.exclude
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account/quotas
      name: account-quotas
      description: REST surface for account-quotas.
      operations:
      - method: GET
        name: get
        description: Associated Press View your API request limits.
        call: meda-account.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content/rss
      name: content-rss
      description: REST surface for content-rss.
      operations:
      - method: GET
        name: get
        description: Associated Press Retrieve a list of available RSS XML feeds entitled to your plan.
        call: meda-account.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: meda-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Associated Press AP Media API — Account. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: associated-press-view-available-account
      description: Associated Press View available account endpoints
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meda-account.get
      outputParameters:
      - type: object
        mapping: $.
    - name: associated-press-view-your-order
      description: Associated Press View your order history.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meda-account.get
      with:
        include: tools.include
        exclude: tools.exclude
        min_date: tools.min_date
        max_date: tools.max_date
        order: tools.order
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: associated-press-view-your-followed
      description: Associated Press View your Followed Topics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meda-account.get
      with:
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: associated-press-view-your-plans
      description: Associated Press View your plans and meters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meda-account.get
      with:
        include: tools.include
        exclude: tools.exclude
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: associated-press-view-your-api
      description: Associated Press View your API request limits.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meda-account.get
      outputParameters:
      - type: object
        mapping: $.
    - name: associated-press-retrieve-list-available
      description: Associated Press Retrieve a list of available RSS XML feeds entitled to your plan.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meda-account.get
      outputParameters:
      - type: object
        mapping: $.
