aid: associated-press
name: Associated Press
description: >-
  The Associated Press (AP) is an American not-for-profit news agency. The AP
  provides APIs for accessing election data, news content, and media assets.
  The AP Elections API enables integration with election systems to retrieve
  election race information and results for powering election websites and
  applications.
type: Index
